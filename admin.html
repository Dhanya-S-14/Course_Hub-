<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | CourseHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --clr-bg: #f8fafc;
            --clr-surface: #ffffff;
            --clr-surface-light: #f1f5f9;
            --clr-primary: #6366f1;
            --clr-text-main: #1e293b;
            --clr-text-muted: #64748b;
            --clr-border: #e2e8f0;
            --clr-success: #10b981;
            --clr-danger: #ef4444;
            --clr-warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--clr-bg); color: var(--clr-text-main); line-height: 1.6; }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--clr-border);
            padding: 1rem 2rem;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-size: 1.5rem; font-weight: 800; text-decoration: none; color: var(--clr-text-main); }
        .logo i { background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: 2rem; color: var(--clr-text-main); text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        .back-btn:hover { background: var(--clr-primary); border-color: var(--clr-primary); color: white; }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        .admin-header { text-align: center; margin-bottom: 2rem; }
        .admin-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-header p { color: var(--clr-text-muted); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--clr-surface); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--clr-border); text-align: center; }
        .stat-card i { font-size: 2rem; color: var(--clr-primary); margin-bottom: 0.5rem; }
        .stat-card .number { font-size: 2.5rem; font-weight: 800; color: var(--clr-text-main); }
        .stat-card .label { color: var(--clr-text-muted); font-size: 0.9rem; }

        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab-btn { padding: 0.75rem 1.5rem; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; background: var(--clr-surface); color: var(--clr-text-muted); }
        .tab-btn.active { background: var(--clr-primary); color: white; }
        .tab-btn:hover:not(.active) { border-color: var(--clr-primary); color: var(--clr-primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-section { background: var(--clr-surface); border-radius: 16px; padding: 2rem; border: 1px solid var(--clr-border); margin-bottom: 2rem; }
        .form-section h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .form-section h3 i { color: var(--clr-primary); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.9rem; font-weight: 600; color: var(--clr-text-main); }
        .form-group input, .form-group select, .form-group textarea { padding: 0.75rem 1rem; border: 1px solid var(--clr-border); border-radius: 10px; font-size: 0.95rem; font-family: inherit; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--clr-primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .btn { padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--clr-primary); color: white; }
        .btn-primary:hover { background: #5558e3; transform: translateY(-2px); }
        .btn-success { background: var(--clr-success); color: white; }
        .btn-success:hover { background: #0ea576; }
        .btn-danger { background: var(--clr-danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-group { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }

        .courses-section { background: var(--clr-surface); border-radius: 16px; padding: 2rem; border: 1px solid var(--clr-border); }
        .courses-section h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .courses-section h3 i { color: var(--clr-primary); }

        .search-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .search-bar input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--clr-border); border-radius: 10px; font-size: 0.95rem; }
        .search-bar input:focus { outline: none; border-color: var(--clr-primary); }

        .course-table { width: 100%; border-collapse: collapse; }
        .course-table th, .course-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--clr-border); font-size: 0.9rem; }
        .course-table th { background: var(--clr-surface-light); font-weight: 600; }
        .course-table tr:hover { background: var(--clr-surface-light); }
        .course-table .actions { display: flex; gap: 0.5rem; }
        .course-table .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 6px; }
        .course-table .company-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; background: rgba(99, 102, 241, 0.1); color: var(--clr-primary); }

        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 10px; color: white; font-weight: 600; display: none; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: var(--clr-success); display: block; }
        .toast.error { background: var(--clr-danger); display: block; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .empty-state { text-align: center; padding: 3rem; color: var(--clr-text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

        .loading { text-align: center; padding: 2rem; color: var(--clr-text-muted); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .course-table { display: block; overflow-x: auto; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>CourseHub Admin</span>
            </a>
            <div style="display: flex; gap: 1rem;">
                <a href="#" onclick="logout()" class="back-btn" style="background: #ef4444; border-color: #ef4444; color: white;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
                <a href="index.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i> Back to Site
                </a>
            </div>
        </div>
    </nav>
    <script>
        function logout() {
            sessionStorage.removeItem('adminAuth');
            window.location.href = 'admin-login.html';
        }
    </script>

    <div class="container">
        <div class="admin-header">
            <h1><i class="fa-solid fa-gear"></i> Admin Dashboard</h1>
            <p>Manage your courses and content</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-book"></i>
                <div class="number" id="totalCourses">0</div>
                <div class="label">Total Courses</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-building"></i>
                <div class="number" id="totalCompany">0</div>
                <div class="label">Company Courses</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-users"></i>
                <div class="number" id="totalUsers">0</div>
                <div class="label">Registered Users</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('courses')">
                <i class="fa-solid fa-book"></i> Courses
            </button>
            <button class="tab-btn" onclick="showTab('company')">
                <i class="fa-solid fa-building"></i> Company Courses
            </button>
            <button class="tab-btn" onclick="showTab('add')">
                <i class="fa-solid fa-plus"></i> Add Course
            </button>
            <button class="tab-btn" onclick="showTab('add-company')">
                <i class="fa-solid fa-plus"></i> Add Company Course
            </button>
        </div>

        <!-- Courses Tab -->
        <div class="tab-content active" id="tab-courses">
            <div class="courses-section">
                <h3><i class="fa-solid fa-book"></i> All Courses</h3>
                <div class="search-bar">
                    <input type="text" id="courseSearch" placeholder="Search courses..." onkeyup="filterCourses()">
                    <button class="btn btn-primary" onclick="loadCourses()">
                        <i class="fa-solid fa-refresh"></i> Refresh
                    </button>
                </div>
                <div id="coursesList">
                    <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
                </div>
            </div>
        </div>

        <!-- Company Courses Tab -->
        <div class="tab-content" id="tab-company">
            <div class="courses-section">
                <h3><i class="fa-solid fa-building"></i> Company Courses</h3>
                <div class="search-bar">
                    <input type="text" id="companySearch" placeholder="Search by company or title..." onkeyup="filterCompanyCourses()">
                    <select id="companyFilter" onchange="filterCompanyCourses()" style="padding: 0.75rem 1rem; border: 1px solid var(--clr-border); border-radius: 10px;">
                        <option value="">All Companies</option>
                        <option value="Google">Google</option>
                        <option value="Microsoft">Microsoft</option>
                        <option value="Amazon">Amazon</option>
                        <option value="Meta">Meta</option>
                        <option value="IBM">IBM</option>
                        <option value="Cisco">Cisco</option>
                        <option value="Oracle">Oracle</option>
                        <option value="Salesforce">Salesforce</option>
                        <option value="GitHub">GitHub</option>
                        <option value="HP">HP</option>
                        <option value="TCS">TCS</option>
                        <option value="LinkedIn">LinkedIn</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadCompanyCourses()">
                        <i class="fa-solid fa-refresh"></i> Refresh
                    </button>
                </div>
                <div id="companyCoursesList">
                    <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
                </div>
            </div>
        </div>

        <!-- Add Course Tab -->
        <div class="tab-content" id="tab-add">
            <div class="form-section">
                <h3><i class="fa-solid fa-plus"></i> Add New Course</h3>
                <form id="addCourseForm" onsubmit="addCourse(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Course Title *</label>
                            <input type="text" name="title" required placeholder="e.g., Python for Everybody">
                        </div>
                        <div class="form-group">
                            <label>Provider *</label>
                            <input type="text" name="provider" required placeholder="e.g., Coursera - University of Michigan">
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select name="category" required>
                                <option value="">Select Category</option>
                                <option value="Python">Python</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Machine Learning">Machine Learning</option>
                                <option value="Data Science">Data Science</option>
                                <option value="Cloud">Cloud</option>
                                <option value="DSA">DSA</option>
                                <option value="Database">Database</option>
                                <option value="DevOps">DevOps</option>
                                <option value="AI">AI</option>
                                <option value="Mobile Development">Mobile Development</option>
                                <option value="Cybersecurity">Cybersecurity</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Cost *</label>
                            <input type="text" name="cost" required placeholder="e.g., Free or $49/mo">
                        </div>
                        <div class="form-group">
                            <label>Rating (0-5)</label>
                            <input type="number" name="rating" min="0" max="5" step="0.1" placeholder="e.g., 4.8">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Course Link *</label>
                            <input type="url" name="link" required placeholder="https://...">
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-plus"></i> Add Course
                        </button>
                        <button type="reset" class="btn btn-primary">
                            <i class="fa-solid fa-rotate-left"></i> Reset
                        </button>
                    </div>
                </form>
            </div>

            <!-- Bulk Import -->
            <div class="form-section">
                <h3><i class="fa-solid fa-upload"></i> Bulk Import (JSON)</h3>
                <div class="form-group">
                    <label>Paste JSON Array</label>
                    <textarea id="bulkJson" rows="8" placeholder='[{"title": "Course 1", "provider": "Coursera", "category": "Python", "cost": "Free", "rating": 4.8, "link": "https://..."}]'></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="bulkImportCourses()">
                        <i class="fa-solid fa-upload"></i> Import Courses
                    </button>
                </div>
            </div>
        </div>

        <!-- Add Company Course Tab -->
        <div class="tab-content" id="tab-add-company">
            <div class="form-section">
                <h3><i class="fa-solid fa-plus"></i> Add Company Course</h3>
                <form id="addCompanyForm" onsubmit="addCompanyCourse(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Course Title *</label>
                            <input type="text" name="title" required placeholder="e.g., Google Data Analytics">
                        </div>
                        <div class="form-group">
                            <label>Company *</label>
                            <select name="company" required>
                                <option value="">Select Company</option>
                                <option value="Google">Google</option>
                                <option value="Microsoft">Microsoft</option>
                                <option value="Amazon">Amazon AWS</option>
                                <option value="Meta">Meta</option>
                                <option value="IBM">IBM</option>
                                <option value="Cisco">Cisco</option>
                                <option value="Oracle">Oracle</option>
                                <option value="Salesforce">Salesforce</option>
                                <option value="GitHub">GitHub</option>
                                <option value="HP">HP</option>
                                <option value="TCS">TCS</option>
                                <option value="LinkedIn">LinkedIn</option>
                                <option value="Apple">Apple</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Provider *</label>
                            <input type="text" name="provider" required placeholder="e.g., Google (Coursera)">
                        </div>
                        <div class="form-group">
                            <label>Sub Provider</label>
                            <input type="text" name="subProvider" placeholder="e.g., Coursera">
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select name="category" required>
                                <option value="">Select Category</option>
                                <option value="Data Analytics">Data Analytics</option>
                                <option value="Cloud Computing">Cloud Computing</option>
                                <option value="Machine Learning">Machine Learning</option>
                                <option value="Web Development">Web Development</option>
                                <option value="AI">AI</option>
                                <option value="Cybersecurity">Cybersecurity</option>
                                <option value="Database">Database</option>
                                <option value="DevOps">DevOps</option>
                                <option value="Networking">Networking</option>
                                <option value="CRM">CRM</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Cost *</label>
                            <input type="text" name="cost" required placeholder="e.g., Free or $49/mo">
                        </div>
                        <div class="form-group">
                            <label>Rating (0-5)</label>
                            <input type="number" name="rating" min="0" max="5" step="0.1" placeholder="e.g., 4.8">
                        </div>
                        <div class="form-group">
                            <label>Suitable For</label>
                            <input type="text" name="suitableFor" placeholder="e.g., CS students learning AI">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Course Link *</label>
                            <input type="url" name="link" required placeholder="https://...">
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-plus"></i> Add Company Course
                        </button>
                        <button type="reset" class="btn btn-primary">
                            <i class="fa-solid fa-rotate-left"></i> Reset
                        </button>
                    </div>
                </form>
            </div>

            <!-- Bulk Import Company -->
            <div class="form-section">
                <h3><i class="fa-solid fa-upload"></i> Bulk Import Company Courses (JSON)</h3>
                <div class="form-group">
                    <label>Paste JSON Array</label>
                    <textarea id="bulkCompanyJson" rows="8" placeholder='[{"title": "Course 1", "company": "Google", "provider": "Coursera", "category": "Data Analytics", "cost": "Free", "rating": 4.8, "link": "https://..."}]'></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="bulkImportCompanyCourses()">
                        <i class="fa-solid fa-upload"></i> Import Company Courses
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Check admin authentication
        if (sessionStorage.getItem('adminAuth') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        let allCourses = [];
        let allCompanyCourses = [];

        // Show tab
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // Load stats
        const API_BASE = 'http://localhost:5000';
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/test`);
                const data = await response.json();
                document.getElementById('totalCourses').textContent = data.courses || 0;
                document.getElementById('totalCompany').textContent = data.companyCourses || 0;
                document.getElementById('totalUsers').textContent = data.users || 0;
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }

        // Load courses
        async function loadCourses() {
            const coursesList = document.getElementById('coursesList');
            coursesList.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/courses`);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                allCourses = data;
                displayCourses(allCourses);
            } catch (err) {
                console.error('Error loading courses:', err);
                coursesList.innerHTML = '<div class="empty-state"><i class="fa-solid fa-exclamation-triangle"></i><p>Error loading courses. Check console.</p></div>';
            }
        }

        // Display courses
        function displayCourses(courses) {
            const coursesList = document.getElementById('coursesList');
            
            if (courses.length === 0) {
                coursesList.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No courses found</p></div>';
                return;
            }

            let html = `
                <table class="course-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Provider</th>
                            <th>Category</th>
                            <th>Cost</th>
                            <th>Rating</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            courses.forEach(course => {
                html += `
                    <tr>
                        <td><strong>${course.title || '-'}</strong></td>
                        <td>${course.provider || '-'}</td>
                        <td><span class="company-badge">${course.category || '-'}</span></td>
                        <td>${course.cost || '-'}</td>
                        <td>${course.rating || '-'}</td>
                        <td class="actions">
                            <a href="${course.link || '#'}" target="_blank" class="btn btn-primary btn-sm">
                                <i class="fa-solid fa-external-link"></i>
                            </a>
                            <button class="btn btn-danger btn-sm" onclick="deleteCourse('${course._id}')">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            coursesList.innerHTML = html;
        }

        // Filter courses
        function filterCourses() {
            const search = document.getElementById('courseSearch').value.toLowerCase();
            const filtered = allCourses.filter(course => 
                (course.title && course.title.toLowerCase().includes(search)) ||
                (course.provider && course.provider.toLowerCase().includes(search)) ||
                (course.category && course.category.toLowerCase().includes(search))
            );
            displayCourses(filtered);
        }

        // Load company courses
        async function loadCompanyCourses() {
            const companyCoursesList = document.getElementById('companyCoursesList');
            companyCoursesList.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/company-courses`);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                allCompanyCourses = data;
                displayCompanyCourses(allCompanyCourses);
            } catch (err) {
                console.error('Error loading company courses:', err);
                companyCoursesList.innerHTML = '<div class="empty-state"><i class="fa-solid fa-exclamation-triangle"></i><p>Error loading courses. Check console.</p></div>';
            }
        }

        // Display company courses
        function displayCompanyCourses(courses) {
            const companyCoursesList = document.getElementById('companyCoursesList');
            
            if (courses.length === 0) {
                companyCoursesList.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No company courses found</p></div>';
                return;
            }

            let html = `
                <table class="course-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Company</th>
                            <th>Provider</th>
                            <th>Category</th>
                            <th>Cost</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            courses.forEach(course => {
                html += `
                    <tr>
                        <td><strong>${course.title || '-'}</strong></td>
                        <td><span class="company-badge">${course.company || '-'}</span></td>
                        <td>${course.provider || '-'}</td>
                        <td>${course.category || '-'}</td>
                        <td>${course.cost || '-'}</td>
                        <td class="actions">
                            <a href="${course.link || '#'}" target="_blank" class="btn btn-primary btn-sm">
                                <i class="fa-solid fa-external-link"></i>
                            </a>
                            <button class="btn btn-danger btn-sm" onclick="deleteCompanyCourse('${course._id}')">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            companyCoursesList.innerHTML = html;
        }

        // Filter company courses
        function filterCompanyCourses() {
            const search = document.getElementById('companySearch').value.toLowerCase();
            const companyFilter = document.getElementById('companyFilter').value;
            
            let filtered = allCompanyCourses.filter(course => 
                (course.title && course.title.toLowerCase().includes(search)) ||
                (course.company && course.company.toLowerCase().includes(search))
            );
            
            if (companyFilter) {
                filtered = filtered.filter(course => course.company === companyFilter);
            }
            
            displayCompanyCourses(filtered);
        }

        // Add course
        async function addCourse(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const course = Object.fromEntries(formData);
            
            try {
                const response = await fetch(`${API_BASE}/api/courses`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(course)
                });
                
                if (response.ok) {
                    showToast('Course added successfully!', 'success');
                    form.reset();
                    loadCourses();
                    loadStats();
                } else {
                    showToast('Error adding course', 'error');
                }
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

        // Add company course
        async function addCompanyCourse(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const course = Object.fromEntries(formData);
            
            try {
                const response = await fetch(`${API_BASE}/api/company-courses`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(course)
                });
                
                if (response.ok) {
                    showToast('Company course added successfully!', 'success');
                    form.reset();
                    loadCompanyCourses();
                    loadStats();
                } else {
                    showToast('Error adding course', 'error');
                }
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

        // Delete course
        async function deleteCourse(id) {
            if (!confirm('Are you sure you want to delete this course?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/courses/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Course deleted!', 'success');
                    loadCourses();
                    loadStats();
                }
            } catch (err) {
                showToast('Error deleting course', 'error');
            }
        }

        // Delete company course
        async function deleteCompanyCourse(id) {
            if (!confirm('Are you sure you want to delete this course?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/company-courses/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Course deleted!', 'success');
                    loadCompanyCourses();
                    loadStats();
                }
            } catch (err) {
                showToast('Error deleting course', 'error');
            }
        }

        // Bulk import courses
        async function bulkImportCourses() {
            const jsonText = document.getElementById('bulkJson').value;
            
            try {
                const courses = JSON.parse(jsonText);
                if (!Array.isArray(courses)) throw new Error('Not an array');
                
                for (const course of courses) {
                    await fetch(`${API_BASE}/api/courses`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(course)
                    });
                }
                
                showToast(`${courses.length} courses imported!`, 'success');
                document.getElementById('bulkJson').value = '';
                loadCourses();
                loadStats();
            } catch (err) {
                showToast('Invalid JSON format', 'error');
            }
        }

        // Bulk import company courses
        async function bulkImportCompanyCourses() {
            const jsonText = document.getElementById('bulkCompanyJson').value;
            
            try {
                const courses = JSON.parse(jsonText);
                if (!Array.isArray(courses)) throw new Error('Not an array');
                
                for (const course of courses) {
                    await fetch(`${API_BASE}/api/company-courses`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(course)
                    });
                }
                
                showToast(`${courses.length} company courses imported!`, 'success');
                document.getElementById('bulkCompanyJson').value = '';
                loadCompanyCourses();
                loadStats();
            } catch (err) {
                showToast('Invalid JSON format', 'error');
            }
        }

        // Toast notification
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadCourses();
        });
    </script>
</body>
</html>
